<html>
    <head>
        <link rel="stylesheet" href="index.css" />
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Smythe&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./index.css" />
    </head>
    <body>
        <header>
            <h1>Jimmy’s Diner</h1>
            <p>The best burgers and pizzas in town.</p>
        </header>
        <main id="main-content"></main>
        <section id="order-section">
            <h2>Your order</h2>
            <div id="order-item-container"></div>
            <div class="total-price">
                <p>Total price:</p>
                <p id="total-price"></p>
            </div>
            <button id="complete-order-btn">Complete order</button>
        </section>
        <section id="after-payment-section">
            <p id="after-payment-p"></p>
        </section>
        <div id="modal">
            <p>Enter card details</p>
            <form id="pay-form">
                <input
                    name="customer-name"
                    type="text"
                    placeholder="Enter your name"
                    required
                />
                <input type="text" placeholder="Enter card number" required />
                <input type="text" placeholder="Enter CVV" required />
                <button type="submit">Pay</button>
            </form>
        </div>
        <script src="index.js" type="module"></script>
    </body>
</html>
